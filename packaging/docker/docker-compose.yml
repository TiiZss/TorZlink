services:

  torzlink:

    build:
      context: ../..
      dockerfile: packaging/docker/Dockerfile

    image: torzlink:latest

    stdin_open: true

    tty: true

    # Optional — launchers create an empty .env when missing (Telegram only).
    env_file:
      - path: ../../.env
        required: false

    environment:

      COLORTERM: truecolor

      FORCE_COLOR: "3"

      TERM: xterm-256color

      TORZLINK_STATE_DIR: /data

      TORZLINK_DOWNLOAD_DIR: /downloads

      TORZLINK_DISABLE_NAT: "1"

      TORZLINK_SKIP_UPDATE: "1"

    volumes:

      - torzlink-data:/data

      - ../../downloads:/downloads

    # TTY required (-it). Easiest: npm run docker:run



volumes:

  torzlink-data:
