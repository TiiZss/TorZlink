name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
        env:
          TORZLINK_SKIP_UPDATE: "1"
      - run: npm run build
      - name: Generate SBOM
        run: npm sbom --omit=dev --sbom-format=cyclonedx --sbom-type=library > sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - id: image
        shell: bash
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/docker/Dockerfile
          push: false
          load: true
          tags: |
            ghcr.io/${{ steps.image.outputs.name }}:latest
            ghcr.io/${{ steps.image.outputs.name }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Container vulnerability scan
        # Pin by commit SHA (trivy-action tags were historically mutable / compromised).
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ steps.image.outputs.name }}:${{ github.ref_name }}
          severity: CRITICAL
          exit-code: "1"
      - name: Push image to GHCR
        run: |
          docker push "ghcr.io/${{ steps.image.outputs.name }}:${{ github.ref_name }}"
          docker push "ghcr.io/${{ steps.image.outputs.name }}:latest"

  github-release:
    runs-on: ubuntu-latest
    needs: [test, docker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: sbom
      - name: Extract changelog for tag
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [ -f CHANGELOG.md ]; then
            awk -v tag="$TAG" '
              /^## \[/ {
                if (found) exit
                line = $0
                gsub(/^## \[/, "", line)
                gsub(/\].*$/, "", line)
                if (line == tag || line == tag "-fork") found = 1
                next
              }
              found { print }
            ' CHANGELOG.md > release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > release-notes.md
          fi
      # Pin by commit SHA (mutable tags).
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          body_path: release-notes.md
          generate_release_notes: true
          files: sbom.cdx.json
